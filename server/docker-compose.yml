services:
  agy-sync:
    image: lscr.io/linuxserver/openssh-server:latest
    container_name: agy-sync
    environment:
      - PUID=1000
      - PGID=1000
      - PUBLIC_KEY="your ssh public key here"
      - USER_NAME=agysync
      - PASSWORD_ACCESS=false
    volumes:
      - /srv/agy-brain:/data/brain
    ports:
      - "2222:2222"
    restart: unless-stopped
